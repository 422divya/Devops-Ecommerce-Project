
---
apiVersion: v1
kind: Service
metadata:
  name: backend

spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 5678
      protocol: TCP
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Hello from backend"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-content
 
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8" />
      <title>Microservices Demo</title>
      <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; }
      </style>
    </head>
    <body>
      <h1>Microservices Demo</h1>
      <p>This page calls the backend service inside the cluster.</p>
      <p><strong>Backend response:</strong></p>
      <pre id="response">Loading...</pre>
      <script>
        fetch('/api')
          .then(r => r.text())
          .then(text => document.getElementById('response').textContent = text)
          .catch(err => document.getElementById('response').textContent = 'Error: ' + err);
      </script>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config

data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
      worker_connections  1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile        on;
      keepalive_timeout  65;

      server {
        listen       80;
        server_name  localhost;

        location / {
          root   /usr/share/nginx/html;
          index  index.html;
          try_files $uri $uri/ =404;
        }

        location /api {
          proxy_pass http://backend:8080;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: content
          configMap:
            name: frontend-content
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend

spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: frontend
